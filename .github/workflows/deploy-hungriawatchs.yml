name: Deploy Hungria Watchs

on:
  push:
    branches: [main]
    paths:
      - 'apps/hungriawatchs/**'
      - 'packages/ui/**'
      - 'package.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:hw

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_TOKEN }}
          external_repository: kdsnunes/hungriawatches
          publish_branch: gh-pages
          publish_dir: ./apps/hungriawatchs/dist
